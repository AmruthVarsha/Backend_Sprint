<app-navbar></app-navbar>

<main class="min-h-screen pt-24 pb-12 bg-[#f8f9fa]">
  <div class="max-w-3xl mx-auto px-6">
    <div class="bg-white rounded-3xl p-8 md:p-12 shadow-xl shadow-slate-200/50 border border-slate-100 animate-fade-in">
      <header class="mb-10 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-orange-50 text-primary mb-4">
          <span class="material-symbols-outlined text-3xl">support_agent</span>
        </div>
        <h1 class="text-3xl font-black text-[#1a1a1a] tracking-tight">Customer Support</h1>
        <p class="text-slate-500 mt-2">How can we help you today?</p>
      </header>

      @if (successMessage) {
        <div class="bg-emerald-50 border border-emerald-100 text-emerald-700 p-4 rounded-2xl mb-8 flex items-center gap-3 animate-scale-in">
          <span class="material-symbols-outlined">check_circle</span>
          <p class="font-medium">{{ successMessage }}</p>
        </div>
      }

      @if (errorMessage) {
        <div class="bg-red-50 border border-red-100 text-red-700 p-4 rounded-2xl mb-8 flex items-center gap-3 animate-scale-in">
          <span class="material-symbols-outlined">error</span>
          <p class="font-medium">{{ errorMessage }}</p>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #supportForm="ngForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-sm font-bold text-[#1a1a1a] ml-1">Full Name</label>
            <input 
              type="text" 
              name="name" 
              [(ngModel)]="supportData.name"
              required
              placeholder="John Doe"
              class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all outline-none text-[#1a1a1a] font-medium"
            />
          </div>
          <div class="space-y-2">
            <label class="text-sm font-bold text-[#1a1a1a] ml-1">Email Address</label>
            <input 
              type="email" 
              name="email" 
              [(ngModel)]="supportData.email"
              required
              placeholder="john@example.com"
              class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all outline-none text-[#1a1a1a] font-medium"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-bold text-[#1a1a1a] ml-1">Your Concern</label>
          <textarea 
            name="concern" 
            [(ngModel)]="supportData.concern"
            required
            rows="5"
            placeholder="Please describe your issue or question in detail..."
            class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all outline-none text-[#1a1a1a] font-medium resize-none"
          ></textarea>
        </div>

        <button 
          type="submit" 
          [disabled]="isSubmitting || !supportForm.valid"
          class="w-full py-5 bg-primary text-white rounded-2xl font-bold text-lg shadow-xl shadow-primary/20 hover:bg-surface-tint hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:scale-100 flex items-center justify-center gap-3"
        >
          @if (isSubmitting) {
            <div class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            Sending...
          } @else {
            <span class="material-symbols-outlined">send</span>
            Submit Request
          }
        </button>
      </form>
    </div>

    <!-- Contact Info -->
    <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6 animate-slide-up delay-200">
      <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm text-center">
        <span class="material-symbols-outlined text-primary mb-2">mail</span>
        <h3 class="font-bold text-[#1a1a1a]">Email Us</h3>
        <p class="text-slate-500 text-sm">support@crave.com</p>
      </div>
      <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm text-center">
        <span class="material-symbols-outlined text-primary mb-2">call</span>
        <h3 class="font-bold text-[#1a1a1a]">Call Us</h3>
        <p class="text-slate-500 text-sm">+91 98765 43210</p>
      </div>
      <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm text-center">
        <span class="material-symbols-outlined text-primary mb-2">location_on</span>
        <h3 class="font-bold text-[#1a1a1a]">Visit Us</h3>
        <p class="text-slate-500 text-sm">Crave HQ, Bangalore</p>
      </div>
    </div>
  </div>
</main>

<app-footer></app-footer>
